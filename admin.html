<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BrandSetu — Admin: Manage Reviews</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F9F5F2;color:#3D3347;min-height:100vh}
.wrap{max-width:780px;margin:0 auto;padding:40px 20px}
h1{font-size:1.6rem;font-weight:800;color:#1A0A2E;margin-bottom:8px}
.subtitle{color:#6B5F78;font-size:0.9rem;margin-bottom:32px}

/* Login screen */
#loginScreen{max-width:380px;margin:80px auto;text-align:center}
#loginScreen h2{font-size:1.3rem;margin-bottom:16px;color:#1A0A2E}
#loginScreen input{width:100%;padding:12px 14px;border:1.5px solid rgba(123,47,247,0.25);border-radius:8px;font-size:0.95rem;margin-bottom:12px;outline:none}
#loginScreen input:focus{border-color:#7B2FF7}
#loginScreen button{width:100%;padding:12px;border:none;border-radius:8px;background:#7B2FF7;color:#fff;font-weight:700;font-size:0.95rem;cursor:pointer}
#loginScreen button:hover{background:#6520d4}
#loginError{color:#d32f2f;font-size:0.85rem;margin-top:8px;display:none}

/* Dashboard */
#dashboard{display:none}
.tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid rgba(123,47,247,0.12)}
.tab{padding:10px 18px;font-size:0.88rem;font-weight:700;color:#6B5F78;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#7B2FF7;border-bottom-color:#7B2FF7}
.review-row{background:#fff;border:1px solid rgba(123,47,247,0.1);border-radius:12px;padding:20px;margin-bottom:14px}
.review-row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.review-row-name{font-weight:700;color:#1A0A2E;font-size:0.95rem}
.review-row-role{display:inline-block;font-size:0.7rem;font-weight:700;padding:2px 9px;border-radius:20px;background:#ede6fd;color:#7B2FF7;text-transform:uppercase;letter-spacing:0.04em;margin-left:8px}
.review-row-stars{color:#FF7A18;font-size:0.95rem}
.review-row-text{font-size:0.9rem;color:#3D3347;line-height:1.55;margin-bottom:14px}
.review-row-actions{display:flex;gap:8px}
.btn-sm{padding:8px 16px;border:none;border-radius:6px;font-size:0.82rem;font-weight:700;cursor:pointer}
.btn-approve{background:#25D366;color:#fff}
.btn-approve:hover{background:#1fb857}
.btn-reject{background:#fff;color:#d32f2f;border:1.5px solid #d32f2f}
.btn-reject:hover{background:#fdecea}
.btn-delete{background:#fff;color:#6B5F78;border:1.5px solid rgba(0,0,0,0.15)}
.btn-delete:hover{background:#f3f3f3}
.empty-state{text-align:center;color:#6B5F78;padding:40px 20px;font-size:0.9rem}
.status-badge{font-size:0.7rem;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase}
.status-approved{background:#e8f5e9;color:#2e7d32}
.status-rejected{background:#fde8e8;color:#c62828}

/* Section switcher */
.section-tabs{display:flex;gap:10px;margin-bottom:28px}
.section-tab{padding:10px 20px;border-radius:8px;font-size:0.9rem;font-weight:700;cursor:pointer;background:#fff;border:1.5px solid rgba(123,47,247,0.15);color:#6B5F78}
.section-tab.active{background:#7B2FF7;color:#fff;border-color:#7B2FF7}

/* Creators */
.add-creator-box{background:#fff;border:1px solid rgba(123,47,247,0.1);border-radius:12px;padding:20px;margin-bottom:24px}
.add-creator-box h3{font-size:1rem;margin-bottom:14px;color:#1A0A2E}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:0.82rem;font-weight:700;color:#3D3347;margin-bottom:5px}
.form-row input[type="text"]{width:100%;padding:10px 12px;border:1.5px solid rgba(123,47,247,0.2);border-radius:8px;font-size:0.9rem;outline:none}
.form-row input[type="text"]:focus{border-color:#7B2FF7}
.form-row input[type="file"]{font-size:0.85rem}
.add-creator-box button{padding:10px 20px;background:#7B2FF7;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:0.88rem;cursor:pointer}
.add-creator-box button:hover{background:#6520d4}
.add-creator-box button:disabled{opacity:0.6;cursor:not-allowed}
.creator-row{background:#fff;border:1px solid rgba(123,47,247,0.1);border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.creator-row img, .creator-row .pic-fallback{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,#7B2FF7,#A855F7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
.creator-row-info{flex:1}
.creator-row-name{font-weight:700;font-size:0.92rem;color:#1A0A2E}
.creator-row-handle{font-size:0.8rem;color:#7B2FF7}
</style>
</head>
<body>

<div class="wrap">

  <div id="loginScreen">
    <h2>🔒 Admin Login</h2>
    <input type="password" id="passwordInput" placeholder="Enter admin password" />
    <button onclick="checkPassword()">Login</button>
    <p id="loginError">Wrong password. Try again.</p>
  </div>

  <div id="dashboard">
    <h1>BrandSetu Admin</h1>
    <p class="subtitle">Manage reviews and the creator network shown on the live site.</p>

    <div class="section-tabs">
      <div class="section-tab active" data-section="reviews" onclick="switchSection('reviews')">⭐ Reviews</div>
      <div class="section-tab" data-section="creators" onclick="switchSection('creators')">👥 Creators</div>
    </div>

    <!-- REVIEWS SECTION -->
    <div id="reviewsSection">
      <div class="tabs">
        <div class="tab active" data-tab="pending" onclick="switchTab('pending')">Pending</div>
        <div class="tab" data-tab="approved" onclick="switchTab('approved')">Approved</div>
        <div class="tab" data-tab="rejected" onclick="switchTab('rejected')">Rejected</div>
      </div>
      <div id="reviewsList"></div>
    </div>

    <!-- CREATORS SECTION -->
    <div id="creatorsSection" style="display:none">
      <div class="add-creator-box">
        <h3>+ Add New Creator</h3>
        <div class="form-row">
          <label>Creator Name</label>
          <input type="text" id="newCreatorName" placeholder="e.g. Priya Sharma" />
        </div>
        <div class="form-row">
          <label>Instagram Username</label>
          <input type="text" id="newCreatorInsta" placeholder="e.g. priyacreates (without @)" />
        </div>
        <div class="form-row">
          <label>Profile Photo Link (from Imgur, Google Drive etc.)</label>
          <input type="text" id="newCreatorPhoto" placeholder="https://i.imgur.com/example.jpg" />
        </div>
        <button id="addCreatorBtn" onclick="addCreator()">Add Creator</button>
      </div>
      <div id="creatorsList"></div>
    </div>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, addDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCoxTkjdEqJJKArv8WuaZk_W8fo1RbaI8",
    authDomain: "brandsetu-44bea.firebaseapp.com",
    projectId: "brandsetu-44bea",
    storageBucket: "brandsetu-44bea.firebasestorage.app",
    messagingSenderId: "416775002186",
    appId: "1:416775002186:web:fc0f845c282005fe6d6eb3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ADMIN_PASSWORD = "PWX4MmEKLz6890";
  let currentTab = 'pending';

  window.checkPassword = function() {
    const input = document.getElementById('passwordInput').value;
    if (input === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadReviews('pending');
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  };

  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.checkPassword();
  });

  window.switchTab = function(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-tab') === tab));
    loadReviews(tab);
  };

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  async function loadReviews(status) {
    const list = document.getElementById('reviewsList');
    list.innerHTML = '<p class="empty-state">Loading...</p>';
    try {
      const q = query(collection(db, 'reviews'), where('status', '==', status));
      const snap = await getDocs(q);
      if (snap.empty) {
        list.innerHTML = `<p class="empty-state">No ${status} reviews.</p>`;
        return;
      }
      let html = '';
      snap.forEach(docSnap => {
        const r = docSnap.data();
        const id = docSnap.id;
        const stars = '★'.repeat(r.rating || 0) + '☆'.repeat(5 - (r.rating || 0));
        html += `
          <div class="review-row">
            <div class="review-row-top">
              <div>
                <span class="review-row-name">${escapeHtml(r.name)}</span>
                <span class="review-row-role">${escapeHtml(r.role)}</span>
              </div>
              <span class="review-row-stars">${stars}</span>
            </div>
            <p class="review-row-text">${escapeHtml(r.text)}</p>
            <div class="review-row-actions">
              ${status !== 'approved' ? `<button class="btn-sm btn-approve" onclick="approveReview('${id}')">✓ Approve</button>` : ''}
              ${status !== 'rejected' ? `<button class="btn-sm btn-reject" onclick="rejectReview('${id}')">✕ Reject</button>` : ''}
              <button class="btn-sm btn-delete" onclick="deleteReview('${id}')">🗑 Delete</button>
            </div>
          </div>`;
      });
      list.innerHTML = html;
    } catch (err) {
      console.error(err);
      list.innerHTML = '<p class="empty-state">Failed to load reviews. Check your internet connection.</p>';
    }
  }

  window.approveReview = async function(id) {
    await updateDoc(doc(db, 'reviews', id), { status: 'approved' });
    loadReviews(currentTab);
  };

  window.rejectReview = async function(id) {
    await updateDoc(doc(db, 'reviews', id), { status: 'rejected' });
    loadReviews(currentTab);
  };

  window.deleteReview = async function(id) {
    if (!confirm('Permanently delete this review?')) return;
    await deleteDoc(doc(db, 'reviews', id));
    loadReviews(currentTab);
  };

  // ── SECTION SWITCHER (Reviews vs Creators) ──
  window.switchSection = function(section) {
    document.querySelectorAll('.section-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-section') === section));
    document.getElementById('reviewsSection').style.display = section === 'reviews' ? 'block' : 'none';
    document.getElementById('creatorsSection').style.display = section === 'creators' ? 'block' : 'none';
    if (section === 'creators') loadCreators();
  };

  // ── CREATORS MANAGEMENT ──
  window.addCreator = async function() {
    const nameInput = document.getElementById('newCreatorName');
    const instaInput = document.getElementById('newCreatorInsta');
    const photoInput = document.getElementById('newCreatorPhoto');
    const btn = document.getElementById('addCreatorBtn');

    const name = nameInput.value.trim();
    const instagram = instaInput.value.trim().replace(/^@/, '');
    const photoUrl = photoInput.value.trim();

    if (!name || !instagram) {
      alert('Please enter both name and Instagram username.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      await addDoc(collection(db, 'creators'), {
        name: name,
        instagram: instagram,
        photoUrl: photoUrl,
        status: 'approved',
        createdAt: serverTimestamp()
      });

      nameInput.value = '';
      instaInput.value = '';
      photoInput.value = '';
      loadCreators();
    } catch (err) {
      console.error(err);
      alert('Failed to add creator. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Creator';
    }
  };

  async function loadCreators() {
    const list = document.getElementById('creatorsList');
    list.innerHTML = '<p class="empty-state">Loading...</p>';
    try {
      const snap = await getDocs(collection(db, 'creators'));
      if (snap.empty) {
        list.innerHTML = '<p class="empty-state">No creators added yet.</p>';
        return;
      }
      let html = '';
      snap.forEach(docSnap => {
        const c = docSnap.data();
        const id = docSnap.id;
        const initial = (c.name || '?').trim().charAt(0).toUpperCase();
        const picHtml = c.photoUrl
          ? `<img src="${escapeHtml(c.photoUrl)}" alt="${escapeHtml(c.name)}" />`
          : `<div class="pic-fallback">${escapeHtml(initial)}</div>`;
        html += `
          <div class="creator-row">
            ${picHtml}
            <div class="creator-row-info">
              <div class="creator-row-name">${escapeHtml(c.name)}</div>
              <div class="creator-row-handle">@${escapeHtml(c.instagram)}</div>
            </div>
            <button class="btn-sm btn-delete" onclick="deleteCreator('${id}')">🗑 Remove</button>
          </div>`;
      });
      list.innerHTML = html;
    } catch (err) {
      console.error(err);
      list.innerHTML = '<p class="empty-state">Failed to load creators.</p>';
    }
  }

  window.deleteCreator = async function(id) {
    if (!confirm('Remove this creator from the site?')) return;
    await deleteDoc(doc(db, 'creators', id));
    loadCreators();
  };
</script>
</body>
</html>
